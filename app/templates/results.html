{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Generated Images</h2>
    <a href="{{ url_for('main.index') }}" class="btn btn-primary">Process More Images</a>
</div>

{% if images %}
<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for image in images %}
    <div class="col">
        <div class="card h-100">
            <img src="{{ url_for('main.generated_file', filename=image) }}" class="card-img-top" alt="{{ image }}">
            <div class="card-body">
                <p class="card-text text-center text-muted small">{{ image }}</p>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<div class="alert alert-info">
    No images generated yet.
</div>
{% endif %}
{% endblock %}
